<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Performance">
  <meta name="theme-color" content="#0b0d12">

  <title>Performance Habits</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Fireworks overlay -->
<canvas id="fireworks"></canvas>

<div id="app">

  <!-- ══════════════════ TODAY VIEW ══════════════════════════════ -->
  <div class="view active" id="view-today">
    <div class="view-inner">

      <div class="today-hero">
        <div class="today-eyebrow" id="today-date"></div>

        <!-- Progress ring -->
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 196 196" aria-hidden="true">
            <circle class="ring-bg"  cx="98" cy="98" r="85"/>
            <circle class="ring-arc" id="ring-arc" cx="98" cy="98" r="85"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-lbl">Today</div>
          </div>
        </div>

        <div class="celebrate" id="celebrate">🎉 Perfect Day!</div>
      </div>

      <!-- Habit toggle cards (built by JS) -->
      <div class="habits-list" id="habits-list"></div>

    </div>
  </div>

  <!-- ══════════════════ HISTORY VIEW ════════════════════════════ -->
  <div class="view" id="view-history">
    <div class="view-inner">

      <!-- Month selector -->
      <div class="hist-head">
        <div class="hist-eyebrow">Monthly History</div>
        <div class="month-nav">
          <button class="mnav-btn" id="btn-prev">‹</button>
          <span class="month-name" id="month-name"></span>
          <button class="mnav-btn" id="btn-next">›</button>
        </div>
      </div>

      <!-- Day-of-week labels -->
      <div class="cal-dow">
        <span>S</span><span>M</span><span>T</span>
        <span>W</span><span>T</span><span>F</span><span>S</span>
      </div>

      <!-- Calendar grid (built by JS) -->
      <div class="cal-grid" id="cal-grid"></div>

      <!-- Monthly stats -->
      <div class="mstats" id="mstats"></div>

      <!-- Legend -->
      <div class="legend">
        <span><div class="leg-dot" style="background:rgba(239,68,68,.6)"></div>≤ 60%</span>
        <span><div class="leg-dot" style="background:rgba(234,179,8,.6)"></div>≤ 80%</span>
        <span><div class="leg-dot" style="background:rgba(34,197,94,.6)"></div>100%</span>
      </div>

      <!-- Year overview (built by JS) -->
      <div class="year-hd" id="year-hd"></div>
      <div class="year-grid" id="year-grid"></div>

    </div>
  </div>

  <!-- ══════════════════ BOTTOM NAV ══════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">

    <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      Today
    </button>

    <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2"  x2="16" y2="6"/>
        <line x1="8"  y1="2"  x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      History
    </button>

  </nav>

</div>

<!-- App logic -->
<script src="app.js"></script>

</body>
</html>
